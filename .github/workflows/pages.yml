name: ( Pages ) Publish Javadoc

on:
  workflow_call:
    inputs:
      tag:
        description: "tag (ex. v1.0.0)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "tag (ex. v1.0.0)"
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag }}

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 8

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Aggregate Javadoc
        run: ./gradlew aggregateJavadoc

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/docs/aggregateJavadoc

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Create Pages Summary
        if: success()
        run: |
          {
            echo "## Javadoc 배포 완료 📘"
            echo ""
            echo "- **태그**: \`${{ inputs.tag }}\`"
            echo "- **URL**: ${{ steps.deployment.outputs.page_url }}"
            echo "- **배포자**: ${{ github.actor }}"
            echo "- **시간**: $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M:%S KST')"
            echo "- **커밋**: ${{ github.sha }}"
          } >> $GITHUB_STEP_SUMMARY
